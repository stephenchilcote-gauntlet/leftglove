  } else {
    if (!data.source.url) errors.push('Missing source.url');
    if (!data.source.viewport || typeof data.source.viewport.w !== 'number' || typeof data.source.viewport.h !== 'number') {
      errors.push('Missing or invalid source.viewport (need w and h as numbers)');
    }
    if (!data.source.timestamp) errors.push('Missing source.timestamp');
  }
  if (!Array.isArray(data.elements)) {
    errors.push('Missing or invalid elements array');
  } else {
    data.elements.forEach(function (el, i) {
      if (!el['sieve-id']) errors.push('Element ' + i + ': missing sieve-id');
      if (!el.category) errors.push('Element ' + i + ': missing category');
      if (!el['category-source']) errors.push('Element ' + i + ': missing category-source');
      if (!el.rect || typeof el.rect.x !== 'number') errors.push('Element ' + i + ': missing or invalid rect');
    });
  }
  if (!data.metadata || typeof data.metadata !== 'object') errors.push('Missing metadata object');
  if (typeof data['pass-1-complete'] !== 'boolean') errors.push('Missing pass-1-complete flag');
  return errors;
}

// ---- Export ----
function doExport() {
  const data = toIntermediate(state);
  if (!data) {
    showToast('Nothing to export — run Sieve first.');
    return;
  }

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'toddler-session-' + Date.now() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

async function doExportGlossary() {
  const data = toIntermediate(state);
  if (!data) {
    showToast('Nothing to export — run Sieve first.');
    return;
  }
  const intents = toGlossaryIntents(data);
  if (intents.length === 0) {
    showToast('No named elements — complete Pass 2 first.');
    return;
  }

  // Try POST to SL glossary endpoint
  try {
    const resp = await fetch(API + '/glossary/intents', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(intents),
      signal: AbortSignal.timeout(5000),
    });
    if (resp.ok) {
      showToast('Exported ' + intents.length + ' intent' + (intents.length > 1 ? 's' : '') + ' to glossary.');
      return;
    }
  } catch (_) { /* fall through to download */ }

  // Fallback: download EDN files
  intents.forEach(function (intent) {
    const edn = toEdn(intent);
    const blob = new Blob([edn + '\n'], { type: 'application/edn' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = intent.intent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') + '.edn';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  showToast('Glossary endpoint unavailable — downloaded ' + intents.length + ' EDN file' + (intents.length > 1 ? 's' : '') + '.');
}

// ---- Load ----
document.getElementById('btn-load').addEventListener('click', function () {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', async function (e) {
  if (state.mode === 'resolve' || state.mode === 'diff') {
    showToast(state.mode === 'resolve' ? 'Finish resolving ambiguous matches first.' : 'Accept or review the current diff first.');
    e.target.value = '';
    return;
  }
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';  // reset so same file can be re-loaded
  const reader = new FileReader();
  reader.onload = async function () {
    let data;
    try {
      data = JSON.parse(reader.result);
    } catch (err) {
      showToast('Invalid JSON: ' + err.message);
      return;
    }
    const errors = fromIntermediate(data);
    if (errors.length) {
      showToast('Load failed: ' + errors.join('; '));
      return;
    }
    const n = state.inventory ? state.inventory.elements.length : 0;
    document.getElementById('status-indicator').textContent =
      n + ' element' + (n !== 1 ? 's' : '') + ' (loaded)';
    await renderScreenshot();
    renderOverlay();
    renderPanel();
    renderMetadata();
    saveState();
    showToast('Loaded ' + n + ' elements.', 3000);
  };
  reader.readAsText(file);
});

// ---- Keyboard ----
const KEY_MAP = {
  c: 'clickable',
  t: 'typable',
  r: 'readable',
  x: 'chrome',
  u: 'custom',
  '/': 'split',
  '.': 'skip',
};

document.addEventListener('keydown', function (e) {
  var active = document.activeElement;

  // Don't capture when typing in the URL input
  if (active === document.getElementById('url-input')) {
    if (e.key === 'Enter') {
      e.preventDefault();
      doNavigate();
    }
    return;
  }

  // Resolve mode keyboard handling
  if (state.mode === 'resolve' && state.resolveContext) {
    var ctx = state.resolveContext;
    var group = ctx.allGroups[ctx.currentGroupIdx];

    if (e.key === 'Enter') {
      e.preventDefault();
      // If both old and new selected, pair them
      if (ctx.selectedOld !== null && ctx.selectedNew !== null) {
        resolveSelectNew(ctx.selectedNew); // triggers pairing logic
      } else if (areAllGroupsResolved()) {
        finishResolve();
      }
      return;
    }
    if (e.key === 'd') {
      e.preventDefault();
      if (ctx.selectedOld !== null) resolveMarkOldRemoved(ctx.selectedOld);
      else if (ctx.selectedNew !== null) resolveMarkNewAdded(ctx.selectedNew);
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      resolveNavGroup(1);
      return;
    }
    // Use e.code (Digit1-Digit9) so Shift doesn't change the key on US/intl layouts
    var digitMatch = e.code && e.code.match(/^Digit([1-9])$/);
    if (digitMatch) {
      e.preventDefault();
      var pos = parseInt(digitMatch[1]) - 1;
      if (e.shiftKey) {
        if (group && pos < group.newIdxs.length) resolveSelectNew(group.newIdxs[pos]);
      } else {
        if (group && pos < group.oldIdxs.length) resolveSelectOld(group.oldIdxs[pos]);
      }
      return;
    }
    return;
  }

  // Diff mode keyboard handling
  if (state.mode === 'diff' && state.diffResult) {
    var diff = state.diffResult;
    var totalItems = diff.added.length + diff.removed.length + diff.changed.length;

    if (e.key === 'Enter') {
      e.preventDefault();
      acceptDiff();
      return;
    }
    if (e.key === 'j' || e.key === 'ArrowDown') {
      e.preventDefault();
      if (totalItems === 0) return;
      if (state.diffSelectedIdx === null) {
        state.diffSelectedIdx = 0;
      } else {
        state.diffSelectedIdx = Math.min(totalItems - 1, state.diffSelectedIdx + 1);
      }
      renderDiffPanel();
      renderOverlay();
      return;
    }
    if (e.key === 'k' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (totalItems === 0) return;
      if (state.diffSelectedIdx === null) {
        state.diffSelectedIdx = 0;
      } else {
        state.diffSelectedIdx = Math.max(0, state.diffSelectedIdx - 1);
      }
      renderDiffPanel();
      renderOverlay();
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      state.diffSelectedIdx = null;
      renderDiffPanel();
      renderOverlay();
      return;
    }
    return;
  }

  // Pass 2 / Review keyboard handling
  if (state.mode === 'pass2' || state.mode === 'review') {
    var inInput = active && (active.id === 'name-input' || active.id === 'intent-input' || active.id === 'notes-input');

    if (e.key === 'Escape') {
      e.preventDefault();
      if (state.mode === 'pass2') {
        state.mode = 'review';
      } else {
        state.mode = 'pass2';
        // Rebuild pass2Order in case classifications changed
        buildPass2Order();
        if (state.pass2Order.length > 0) {
          var pos = state.pass2Order.indexOf(state.currentIndex);
          state.pass2Cursor = pos >= 0 ? pos : 0;
          state.currentIndex = state.pass2Order[state.pass2Cursor];
        }
      }
      _lastPass2Rendered = -1;
      saveState();
      renderOverlay();
      renderPanel();
      return;
    }

    if (state.mode === 'pass2') {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (inInput) active.blur();
        acceptName();
        return;
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        if (inInput) active.blur();
        skipName();
        return;
      }
    }

    // Arrow navigation (only when not in a text input)
    if (!inInput) {
      if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1); return; }
    }
    return;
  }

  // Pass 1 keyboard handling
  if (KEY_MAP[e.key]) {
    e.preventDefault();
    classify(KEY_MAP[e.key]);
    return;
  }

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    navigate(-1);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    navigate(1);
  }
});

// ---- Metadata strip ----
function renderMetadata() {
  const strip = document.getElementById('metadata-strip');
  const inv = state.inventory;
  if (!inv) { strip.innerHTML = ''; return; }

  let html = '';

  // Cookies
  const cookies = inv.cookies || [];
  if (cookies.length) {
    html += '<div class="meta-group"><span class="meta-label">Cookies</span>';
    for (const c of cookies) {
      html += '<span class="meta-pill cookies">' + escapeHtml(c) + '</span>';
    }
    html += '</div>';
  }

  // localStorage
  const ls = inv.storage?.localStorage || [];
  if (ls.length) {
    html += '<div class="meta-group"><span class="meta-label">localStorage</span>';
    for (const k of ls) {
      html += '<span class="meta-pill local-storage">' + escapeHtml(k) + '</span>';
    }
    html += '</div>';
  }

  // sessionStorage
  const ss = inv.storage?.sessionStorage || [];
  if (ss.length) {
    html += '<div class="meta-group"><span class="meta-label">sessionStorage</span>';
    for (const k of ss) {
      html += '<span class="meta-pill session-storage">' + escapeHtml(k) + '</span>';
    }
    html += '</div>';
  }

  // Tabs
  const tabs = inv.tabs;
  if (tabs != null) {
    html += '<div class="meta-group"><span class="meta-label">Tabs</span>';
    html += '<span class="meta-pill tabs">' + tabs + '</span>';
    html += '</div>';
  }

  strip.innerHTML = html;
}

// ---- Util ----
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Init ----
document.getElementById('btn-sieve').addEventListener('click', doSieve);
document.getElementById('btn-navigate').addEventListener('click', doNavigate);
document.getElementById('btn-export').addEventListener('click', doExport);
document.getElementById('btn-export-glossary').addEventListener('click', doExportGlossary);

// Restore state on load
loadState();

// Try to get status on load
fetchStatus()
  .then(function (s) {
    if (s.url) document.getElementById('url-input').value = s.url;
    document.getElementById('status-indicator').textContent = 'Connected';
  })
  .catch(function () {
    document.getElementById('status-indicator').textContent = 'SL not connected';
  });
</script>
</body>
