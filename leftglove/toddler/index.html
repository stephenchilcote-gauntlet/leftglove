<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toddler Loop — Pass 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* --- Toolbar --- */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }

  #url-input {
    flex: 1;
    padding: 6px 10px;
    background: #0f3460;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: monospace;
  }

  #url-input:focus { outline: none; border-color: #22d3ee; }

  .btn {
    padding: 6px 14px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #0f3460;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }

  .btn:hover { background: #1a4a7a; }
  .btn:active { background: #0a2a4a; }

  .btn-primary {
    background: #0e4d6e;
    border-color: #22d3ee;
    color: #22d3ee;
    font-weight: 600;
  }

  .btn-primary:hover { background: #126a8a; }

  #status-indicator {
    font-size: 12px;
    color: #888;
    margin-left: auto;
    white-space: nowrap;
  }

  #mode-indicator {
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    margin-left: 8px;
  }
  #mode-indicator.pass1 { background: #1e3a5f; color: #22d3ee; }
  #mode-indicator.pass2 { background: #1e3f1e; color: #4ade80; }
  #mode-indicator.review { background: #3f1e3f; color: #c084fc; }
  #mode-indicator.resolve { background: #5f3a1e; color: #fbbf24; }

  .pass2-controls { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .pass2-controls label { font-size: 11px; color: #888; margin-bottom: -4px; }
  .pass2-controls input, .pass2-controls textarea {
    padding: 5px 8px;
    background: #0f3460;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 13px;
    width: 100%;
    box-sizing: border-box;
  }
  .pass2-controls input:focus, .pass2-controls textarea:focus {
    border-color: #22d3ee;
    outline: none;
  }
  .pass2-controls textarea { resize: vertical; min-height: 32px; max-height: 60px; }
  .pass2-btn-row { display: flex; gap: 6px; align-items: center; }
  .pass2-btn-row .btn { flex: 1; }

  /* --- Screenshot area --- */
  #viewport {
    flex: 1;
    overflow: auto;
    position: relative;
    background: #111;
  }

  #screenshot-container {
    position: relative;
    display: inline-block;
  }

  #screenshot-img {
    display: block;
    image-rendering: auto;
  }

  #overlay-svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }

  #overlay-svg rect { cursor: pointer; pointer-events: all; }

  #empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #555;
    font-size: 16px;
    flex-direction: column;
    gap: 12px;
  }

  #empty-state kbd {
    padding: 2px 6px;
    background: #222;
    border: 1px solid #444;
    border-radius: 3px;
    font-family: monospace;
    font-size: 13px;
  }

  /* --- Bottom panel --- */
  #panel {
    display: flex;
    height: 220px;
    flex-shrink: 0;
    background: #16213e;
    border-top: 2px solid #333;
  }

  #panel-info {
    flex: 1;
    padding: 14px 16px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
    border-right: 1px solid #333;
  }

  #panel-info .field-label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #panel-info .field-value {
    color: #e0e0e0;
    font-family: monospace;
    font-size: 13px;
  }

  #panel-info .field-value.label-text {
    color: #fbbf24;
  }

  #panel-controls {
    width: 340px;
    flex-shrink: 0;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Category buttons */
  .category-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .cat-btn {
    padding: 8px 0;
    width: 56px;
    text-align: center;
    border: 2px solid;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    transition: background 0.1s;
  }

  .cat-btn:hover { filter: brightness(1.3); }

  .cat-btn[data-cat="clickable"]  { border-color: #22c55e; color: #22c55e; }
  .cat-btn[data-cat="typable"]    { border-color: #3b82f6; color: #3b82f6; }
  .cat-btn[data-cat="readable"]   { border-color: #eab308; color: #eab308; }
  .cat-btn[data-cat="chrome"]     { border-color: #6b7280; color: #6b7280; }
  .cat-btn[data-cat="custom"]     { border-color: #a855f7; color: #a855f7; }
  .cat-btn[data-cat="split"]      { border-color: #f97316; color: #f97316; }
  .cat-btn[data-cat="skip"]       { border-color: #525252; color: #525252; }

  .cat-btn[data-cat="clickable"]:hover  { background: rgba(34,197,94,0.15); }
  .cat-btn[data-cat="typable"]:hover    { background: rgba(59,130,246,0.15); }
  .cat-btn[data-cat="readable"]:hover   { background: rgba(234,179,8,0.15); }
  .cat-btn[data-cat="chrome"]:hover     { background: rgba(107,114,128,0.15); }
  .cat-btn[data-cat="custom"]:hover     { background: rgba(168,85,247,0.15); }
  .cat-btn[data-cat="split"]:hover      { background: rgba(249,115,22,0.15); }
  .cat-btn[data-cat="skip"]:hover       { background: rgba(82,82,82,0.15); }

  /* Nav row */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: auto;
  }

  .nav-btn {
    padding: 6px 12px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #0f3460;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 16px;
  }

  .nav-btn:hover { background: #1a4a7a; }

  #progress {
    font-size: 14px;
    font-family: monospace;
    color: #aaa;
  }

  #classified-count {
    font-size: 12px;
    color: #666;
  }

  /* Summary panel */
  #summary {
    display: none;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.8;
  }

  #summary .summary-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #summary .summary-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  /* --- Metadata strip --- */
  #metadata-strip {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 6px 12px;
    background: #111827;
    border-bottom: 1px solid #333;
    font-size: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #metadata-strip .meta-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #metadata-strip .meta-label {
    color: #6b7280;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
  }

  #metadata-strip .meta-pill {
    padding: 2px 8px;
    border-radius: 10px;
    background: #1f2937;
    border: 1px solid #374151;
    color: #d1d5db;
    font-family: monospace;
    font-size: 11px;
  }

  #metadata-strip .meta-pill.cookies { border-color: #f59e0b; color: #fbbf24; }
  #metadata-strip .meta-pill.local-storage { border-color: #10b981; color: #34d399; }
  #metadata-strip .meta-pill.session-storage { border-color: #8b5cf6; color: #a78bfa; }
  #metadata-strip .meta-pill.tabs { border-color: #3b82f6; color: #60a5fa; }

  /* --- Resolve mode --- */
  .resolve-banner {
    padding: 8px 12px;
    background: #451a03;
    border-bottom: 1px solid #92400e;
    color: #fbbf24;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .resolve-columns {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .resolve-col {
    flex: 1;
    padding: 8px 10px;
    overflow-y: auto;
    font-size: 12px;
  }

  .resolve-col:first-child { border-right: 1px solid #333; }

  .resolve-col h4 {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .resolve-item {
    padding: 6px 8px;
    border: 1px solid #333;
    border-radius: 4px;
    margin-bottom: 4px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
  }

  .resolve-item:hover { background: rgba(255,255,255,0.05); }
  .resolve-item.selected { border-color: #22d3ee; background: rgba(34,211,238,0.1); }
  .resolve-item.paired { border-color: #22c55e; background: rgba(34,197,94,0.1); opacity: 0.6; }
  .resolve-item.marked { border-color: #525252; background: rgba(82,82,82,0.1); opacity: 0.5; text-decoration: line-through; }

  .resolve-item .ri-tag { color: #888; }
  .resolve-item .ri-label { color: #fbbf24; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .resolve-item .ri-cat { font-size: 10px; padding: 1px 6px; border-radius: 8px; border: 1px solid; }
  .resolve-item .ri-name { color: #4ade80; font-size: 11px; }

  .resolve-actions {
    display: flex;
    gap: 6px;
    padding: 8px 10px;
    border-top: 1px solid #333;
    align-items: center;
  }

  .resolve-actions .btn { font-size: 12px; padding: 4px 10px; }

  /* --- Diff mode (cuo) --- */
  #mode-indicator.diff { background: #1e3a5f; color: #60a5fa; }

  .diff-banner {
    padding: 8px 12px;
    background: #172554;
    border-bottom: 1px solid #1e3a5f;
    color: #60a5fa;
    font-size: 13px;
    font-weight: 600;
  }

  .diff-counts {
    display: flex;
    gap: 12px;
    padding: 8px 12px;
    font-size: 13px;
    border-bottom: 1px solid #333;
  }

  .diff-counts .added { color: #22c55e; }
  .diff-counts .removed { color: #ef4444; }
  .diff-counts .changed { color: #eab308; }
  .diff-counts .unchanged { color: #666; }

  .diff-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }

  .diff-item {
    padding: 6px 8px;
    border: 1px solid #333;
    border-radius: 4px;
    margin-bottom: 4px;
    cursor: pointer;
    font-size: 12px;
  }

  .diff-item:hover { background: rgba(255,255,255,0.05); }
  .diff-item.selected { border-color: #22d3ee; background: rgba(34,211,238,0.1); }
  .diff-item.diff-added { border-left: 3px solid #22c55e; }
  .diff-item.diff-removed { border-left: 3px solid #ef4444; }
  .diff-item.diff-changed { border-left: 3px solid #eab308; }

  .diff-item .di-type { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-right: 6px; }
  .diff-item .di-type.added { color: #22c55e; }
  .diff-item .di-type.removed { color: #ef4444; }
  .diff-item .di-type.changed { color: #eab308; }
  .diff-item .di-tag { color: #888; }
  .diff-item .di-label { color: #fbbf24; }
  .diff-item .di-changes { color: #999; font-size: 11px; margin-top: 2px; }

  .diff-actions {
    display: flex;
    gap: 6px;
    padding: 8px 10px;
    border-top: 1px solid #333;
    align-items: center;
  }

  .diff-actions .btn { font-size: 12px; padding: 4px 10px; }

  /* Error toast */
  #toast {
    position: fixed;
    top: 60px;
    right: 16px;
    padding: 10px 16px;
    background: #7f1d1d;
    border: 1px solid #dc2626;
    border-radius: 6px;
    color: #fca5a5;
    font-size: 13px;
    z-index: 100;
    display: none;
    max-width: 400px;
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <input type="text" id="url-input" data-testid="url-input" placeholder="Enter URL and press Navigate...">
  <button class="btn" id="btn-navigate" data-testid="btn-navigate">Navigate</button>
  <button class="btn btn-primary" id="btn-sieve" data-testid="btn-sieve">Sieve</button>
  <button class="btn" id="btn-export" data-testid="btn-export">Export</button>
  <button class="btn" id="btn-export-glossary" data-testid="btn-export-glossary" style="display:none">Export Glossary</button>
  <button class="btn" id="btn-load" data-testid="btn-load">Load</button>
  <input type="file" id="file-input" accept=".json" style="display:none">
  <span id="status-indicator" data-testid="status-indicator">Ready</span>
  <span id="mode-indicator" data-testid="mode-indicator"></span>
</div>

<!-- Metadata strip -->
<div id="metadata-strip" data-testid="metadata-strip"></div>

<!-- Screenshot viewport -->
<div id="viewport">
  <div id="empty-state">
    <div>Click <kbd>Sieve</kbd> to capture the current page</div>
    <div>or enter a URL and click <kbd>Navigate</kbd></div>
  </div>
  <div id="screenshot-container" style="display:none;">
    <img id="screenshot-img" data-testid="screenshot-img" alt="Page screenshot">
    <svg id="overlay-svg" data-testid="overlay-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<!-- Bottom panel -->
<div id="panel">
  <div id="panel-info">
    <div id="element-detail" data-testid="element-detail">
      <div style="color:#555;">No elements loaded. Click Sieve to start.</div>
    </div>
    <div id="summary" data-testid="summary"></div>
  </div>
  <div id="panel-controls">
    <div class="category-row">
      <button class="cat-btn" data-cat="clickable" data-testid="cat-clickable" onclick="classify('clickable')"><u>c</u>lick</button>
      <button class="cat-btn" data-cat="typable" data-testid="cat-typable" onclick="classify('typable')"><u>t</u>ype</button>
      <button class="cat-btn" data-cat="readable" data-testid="cat-readable" onclick="classify('readable')"><u>r</u>ead</button>
      <button class="cat-btn" data-cat="chrome" data-testid="cat-chrome" onclick="classify('chrome')">chr(<u>x</u>)</button>
      <button class="cat-btn" data-cat="custom" data-testid="cat-custom" onclick="classify('custom')">c<u>u</u>stom</button>
    </div>
    <div class="category-row">
      <button class="cat-btn" data-cat="split" data-testid="cat-split" onclick="classify('split')"><u>/</u> split</button>
      <button class="cat-btn" data-cat="skip" data-testid="cat-skip" onclick="classify('skip')"><u>.</u> skip</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" data-testid="nav-prev" onclick="navigate(-1)" title="Previous element">&larr;</button>
      <button class="nav-btn" data-testid="nav-next" onclick="navigate(1)" title="Next element">&rarr;</button>
      <span id="progress" data-testid="progress">—</span>
      <span id="classified-count" data-testid="classified-count"></span>
    </div>
  </div>
  <div id="resolve-panel" style="display:none;flex-direction:column;width:100%;"></div>
  <div id="diff-panel" data-testid="diff-summary" style="display:none;flex-direction:column;width:100%;"></div>
</div>

<!-- Error toast -->
<div id="toast" data-testid="toast"></div>

<script>
// API URL: configurable via ?api= query param (for test environments)
const API = new URLSearchParams(window.location.search).get('api') || 'http://localhost:3333';
const STORAGE_KEY = 'toddler-loop-state';

const CATEGORY_COLORS = {
  clickable: '#22c55e',
  typable:   '#3b82f6',
  readable:  '#eab308',
  chrome:    '#6b7280',
  custom:    '#a855f7',
  split:     '#f97316',
  skip:      'transparent',
};

// ---- State ----
let state = {
  inventory: null,
  screenshotUrl: null,
  screenshotDataUrl: null,
  currentIndex: 0,
  classifications: {},
  screenshotDims: { w: 0, h: 0 },
  pageUrl: null,
  mode: 'pass1',          // 'pass1' | 'pass2' | 'review' | 'resolve' | 'diff'
  glossaryNames: {},       // { [inventoryIndex]: { name, intent, source, notes } }
  pass2Order: [],          // filtered+sorted inventory indices for Pass 2 traversal
  pass2Cursor: 0,          // position within pass2Order
  resolveContext: null,    // active resolve session (null when not resolving)
  _pendingSieve: null,     // pending sieve data during resolve/diff mode
  _preResolveMode: null,   // mode to restore after resolve completes
  _preDiffMode: null,      // mode to restore after diff accept
  diffResult: null,        // output of computeDiff()
  diffClass: null,         // output of classifyDiff()
  diffSelectedIdx: null,   // selected item index in flat diff list
  _diffResolvedPairs: null, // resolved pairs from resolve mode (if any)
};

// ---- Persistence ----
function saveState() {
  const toSave = {
    currentIndex: state.currentIndex,
    classifications: state.classifications,
    pageUrl: state.pageUrl,
    mode: state.mode,
    glossaryNames: state.glossaryNames,
    pass2Cursor: state.pass2Cursor,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.currentIndex = saved.currentIndex || 0;
      state.classifications = saved.classifications || {};
      state.pageUrl = saved.pageUrl || null;
      state.mode = saved.mode || 'pass1';
      state.glossaryNames = saved.glossaryNames || {};
      state.pass2Cursor = saved.pass2Cursor || 0;
    }
  } catch (e) { /* ignore corrupt storage */ }
}

// ---- Toast ----
function showToast(msg, duration) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, duration || 4000);
}

// ---- API calls ----
async function fetchSieve() {
  const res = await fetch(API + '/sieve', { method: 'POST' });
  if (!res.ok) throw new Error('Sieve request failed: ' + res.status);
  return res.json();
}

async function fetchScreenshot() {
  const res = await fetch(API + '/screenshot');
  if (!res.ok) throw new Error('Screenshot request failed: ' + res.status);
  const blob = await res.blob();
  var dataUrl = await blobToDataUrl(blob);
  return { blobUrl: URL.createObjectURL(blob), dataUrl: dataUrl };
}

function blobToDataUrl(blob) {
  return new Promise(function (resolve, reject) {
    const reader = new FileReader();
    reader.onload = function () { resolve(reader.result); };
    reader.onerror = function () { reject(reader.error); };
    reader.readAsDataURL(blob);
  });
}

async function fetchNavigate(url) {
  const res = await fetch(API + '/navigate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url }),
  });
  if (!res.ok) throw new Error('Navigate request failed: ' + res.status);
  return res.json();
}

async function fetchStatus() {
  const res = await fetch(API + '/status');
  if (!res.ok) throw new Error('Status request failed: ' + res.status);
  return res.json();
}

// ---- Core actions ----
async function doSieve() {
  if (state.mode === 'resolve' || state.mode === 'diff') {
    showToast(state.mode === 'resolve' ? 'Finish resolving ambiguous matches first.' : 'Accept or review the current diff first.');
    return;
  }
  const statusEl = document.getElementById('status-indicator');
  statusEl.textContent = 'Sieving...';
  try {
    const [inventory, screenshot] = await Promise.all([
      fetchSieve(),
      fetchScreenshot(),
    ]);

    // If we have a previous inventory, match elements instead of resetting
    if (state.inventory && state.inventory.elements?.length && inventory.elements?.length) {
      var oldEls = state.inventory.elements;
      var newEls = inventory.elements;
      var matchResult = matchElements(oldEls, newEls);

      if (matchResult.ambiguous.length > 0) {
        // Ambiguity detected — enter resolve mode (blocking)
        // Don't touch state.screenshotDataUrl yet — keep old screenshot consistent
        var pendingSieve = {
          inventory: inventory,
          screenshotUrl: screenshot.blobUrl,
          screenshotDataUrl: screenshot.dataUrl,
          matchResult: matchResult,
          oldInventory: state.inventory,
          oldClassifications: Object.assign({}, state.classifications),
          oldGlossaryNames: Object.assign({}, state.glossaryNames),
        };
        statusEl.textContent = matchResult.ambiguous.length + ' ambiguous — resolve';
        enterResolveMode(matchResult, pendingSieve);
        return;
      }

      // No ambiguity — enter diff mode for user review
      var pendingSieveDiff = {
        inventory: inventory,
        screenshotUrl: screenshot.blobUrl,
        screenshotDataUrl: screenshot.dataUrl,
        matchResult: matchResult,
        oldInventory: state.inventory,
        oldClassifications: Object.assign({}, state.classifications),
        oldGlossaryNames: Object.assign({}, state.glossaryNames),
      };
      statusEl.textContent = 'Diff ready';
      enterDiffMode(matchResult, pendingSieveDiff, null);
      return;
    } else {
      // First sieve — fresh state
      if (state.screenshotUrl) URL.revokeObjectURL(state.screenshotUrl);

      state.inventory = inventory;
      state.screenshotUrl = screenshot.blobUrl;
      state.screenshotDataUrl = screenshot.dataUrl;
      state.pageUrl = inventory.url?.raw || inventory.url || null;
      state.classifications = {};
      state.currentIndex = 0;
      state.mode = 'pass1';
      state.glossaryNames = {};
      state.pass2Order = [];
      state.pass2Cursor = 0;
    }

    await renderScreenshot();
    renderOverlay();
    renderPanel();
    renderMetadata();
    saveState();

    statusEl.textContent = inventory.elements?.length + ' elements';
  } catch (e) {
    statusEl.textContent = 'Error';
    showToast('Failed to sieve: ' + e.message, 6000);
  }
}

async function doNavigate() {
  if (state.mode === 'resolve' || state.mode === 'diff') {
    showToast(state.mode === 'resolve' ? 'Finish resolving ambiguous matches first.' : 'Accept or review the current diff first.');
    return;
  }
  let url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  document.getElementById('url-input').value = url;
  const statusEl = document.getElementById('status-indicator');
  statusEl.textContent = 'Navigating...';
  try {
    await fetchNavigate(url);
    await doSieve();
  } catch (e) {
    statusEl.textContent = 'Error';
    showToast('Failed to navigate: ' + e.message, 6000);
  }
}

// ---- Rendering ----
function renderScreenshot() {
  return new Promise((resolve) => {
    const container = document.getElementById('screenshot-container');
    const img = document.getElementById('screenshot-img');
    const emptyState = document.getElementById('empty-state');

    img.onload = function () {
      // Use viewport dims from sieve (CSS pixels) if available,
      // otherwise fall back to natural image dims.
      // Screenshot is captured at device pixel ratio (e.g. 2x on Retina)
      // but sieve rects are in CSS pixels — must match coordinate spaces.
      const vp = state.inventory?.viewport;
      const w = vp?.w || img.naturalWidth;
      const h = vp?.h || img.naturalHeight;
      state.screenshotDims = { w: w, h: h };
      img.style.width = w + 'px';
      img.style.height = h + 'px';
      container.style.display = 'inline-block';
      emptyState.style.display = 'none';
      resolve();
    };
    img.src = state.screenshotUrl;
  });
}

function renderResolveOverlay(svg) {
  var ctx = state.resolveContext;
  var pending = state._pendingSieve;
  var group = ctx.allGroups[ctx.currentGroupIdx];
  if (!group) return;

  // Use the OLD screenshot dims (still displayed)
  var dims = state.screenshotDims;
  svg.setAttribute('width', dims.w);
  svg.setAttribute('height', dims.h);
  svg.setAttribute('viewBox', '0 0 ' + dims.w + ' ' + dims.h);

  var html = '';
  var oldEls = pending.oldInventory.elements;
  var newEls = pending.inventory.elements;

  // Draw old elements (red-ish)
  for (var i = 0; i < group.oldIdxs.length; i++) {
    var oi = group.oldIdxs[i];
    var rect = oldEls[oi]?.rect;
    if (!rect) continue;

    var isPaired = ctx.pairs.some(function (p) { return p.oldIdx === oi; });
    var isRemoved = ctx.removedOld.indexOf(oi) >= 0;
    var isSelected = ctx.selectedOld === oi;

    var stroke = isSelected ? '#f87171' : isPaired ? '#166534' : isRemoved ? '#525252' : '#ef4444';
    var sw = isSelected ? 3 : 2;
    var dash = isPaired || isRemoved ? '4,3' : '';
    var opacity = isPaired || isRemoved ? 0.4 : 1;

    html += '<rect x="' + rect.x + '" y="' + rect.y + '" width="' + (rect.w || rect.width) + '" height="' + (rect.h || rect.height) + '"'
      + ' fill="none" stroke="' + stroke + '" stroke-width="' + sw + '"'
      + (dash ? ' stroke-dasharray="' + dash + '"' : '')
      + ' opacity="' + opacity + '" pointer-events="none"/>';

    // Label
    var textY = rect.y - 4;
    html += '<text x="' + rect.x + '" y="' + (textY > 12 ? textY : rect.y + 14) + '"'
      + ' fill="' + stroke + '" font-size="10" font-family="sans-serif" opacity="' + opacity + '">'
      + 'OLD#' + oi + ' ' + escapeHtml((oldEls[oi].label || oldEls[oi].tag || '?').slice(0, 20))
      + '</text>';
  }

  // Draw new elements (green-ish)
  for (var j = 0; j < group.newIdxs.length; j++) {
    var ni = group.newIdxs[j];
    var rect2 = newEls[ni]?.rect;
    if (!rect2) continue;

    var isPaired2 = ctx.pairs.some(function (p) { return p.newIdx === ni; });
    var isAdded = ctx.addedNew.indexOf(ni) >= 0;
    var isSelected2 = ctx.selectedNew === ni;

    var stroke2 = isSelected2 ? '#4ade80' : isPaired2 ? '#166534' : isAdded ? '#525252' : '#22c55e';
    var sw2 = isSelected2 ? 3 : 2;
    var dash2 = isPaired2 || isAdded ? '4,3' : '';
    var opacity2 = isPaired2 || isAdded ? 0.4 : 1;

    html += '<rect x="' + rect2.x + '" y="' + rect2.y + '" width="' + (rect2.w || rect2.width) + '" height="' + (rect2.h || rect2.height) + '"'
      + ' fill="none" stroke="' + stroke2 + '" stroke-width="' + sw2 + '"'
      + (dash2 ? ' stroke-dasharray="' + dash2 + '"' : '')
      + ' opacity="' + opacity2 + '" pointer-events="none"/>';

    var textY2 = (rect2.y + (rect2.h || rect2.height)) + 12;
    html += '<text x="' + rect2.x + '" y="' + textY2 + '"'
      + ' fill="' + stroke2 + '" font-size="10" font-family="sans-serif" opacity="' + opacity2 + '">'
      + 'NEW#' + ni + ' ' + escapeHtml((newEls[ni].label || newEls[ni].tag || '?').slice(0, 20))
      + '</text>';
  }

  svg.innerHTML = html;
}

function renderDiffOverlay(svg) {
  var diff = state.diffResult;
  var pending = state._pendingSieve;
  if (!diff || !pending) return;

  var newEls = pending.inventory.elements;
  var oldEls = pending.oldInventory.elements;
  var dims = state.screenshotDims;
  svg.setAttribute('width', dims.w);
  svg.setAttribute('height', dims.h);

  var html = '';
  var selectedType = null;
  var selectedItemIdx = null;
  if (state.diffSelectedIdx !== null) {
    // Decode flat index: added, then removed, then changed
    var si = state.diffSelectedIdx;
    if (si < diff.added.length) { selectedType = 'added'; selectedItemIdx = si; }
    else if (si < diff.added.length + diff.removed.length) { selectedType = 'removed'; selectedItemIdx = si - diff.added.length; }
    else if (si < diff.added.length + diff.removed.length + diff.changed.length) { selectedType = 'changed'; selectedItemIdx = si - diff.added.length - diff.removed.length; }
  }

  // Unchanged elements — dimmed
  for (var u = 0; u < diff.unchanged.length; u++) {
    var ue = diff.unchanged[u];
    var ub = newEls[ue.newIdx]?.rect || newEls[ue.newIdx]?.box;
    if (!ub) continue;
    html += '<rect x="' + ub.x + '" y="' + ub.y + '" width="' + (ub.width || ub.w) + '" height="' + (ub.height || ub.h) + '"'
      + ' fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>';
  }

  // Added elements — green dashed
  for (var a = 0; a < diff.added.length; a++) {
    var ae = diff.added[a];
    var ab = ae.el?.rect || ae.el?.box;
    if (!ab) continue;
    var isSel = (selectedType === 'added' && selectedItemIdx === a);
    html += '<rect x="' + ab.x + '" y="' + ab.y + '" width="' + (ab.width || ab.w) + '" height="' + (ab.height || ab.h) + '"'
      + ' fill="rgba(34,197,94,0.08)" stroke="' + (isSel ? '#22d3ee' : '#22c55e') + '"'
      + ' stroke-width="' + (isSel ? 3 : 2) + '" stroke-dasharray="6,3"/>';
    var atY = ab.y - 4;
    html += '<text x="' + ab.x + '" y="' + (atY > 10 ? atY : ab.y + 12) + '"'
      + ' fill="#22c55e" font-size="10" font-family="sans-serif" font-weight="700">NEW</text>';
  }

  // Removed elements — panel only, no overlay (old bounding boxes don't map to new screenshot)

  // Changed elements — yellow solid
  for (var c = 0; c < diff.changed.length; c++) {
    var ce = diff.changed[c];
    var cb = ce.newEl?.rect || ce.newEl?.box;
    if (!cb) continue;
    var isSel3 = (selectedType === 'changed' && selectedItemIdx === c);
    html += '<rect x="' + cb.x + '" y="' + cb.y + '" width="' + (cb.width || cb.w) + '" height="' + (cb.height || cb.h) + '"'
      + ' fill="rgba(234,179,8,0.08)" stroke="' + (isSel3 ? '#22d3ee' : '#eab308') + '"'
      + ' stroke-width="' + (isSel3 ? 3 : 2) + '"/>';
    var ctY = cb.y - 4;
    html += '<text x="' + cb.x + '" y="' + (ctY > 10 ? ctY : cb.y + 12) + '"'
      + ' fill="#eab308" font-size="10" font-family="sans-serif" font-weight="600">'
      + escapeHtml(ce.changes[0].slice(0, 25)) + '</text>';
  }

  svg.innerHTML = html;
}

function renderOverlay() {
  const svg = document.getElementById('overlay-svg');

  // Resolve mode: show old+new element highlights
  if (state.mode === 'resolve' && state.resolveContext && state._pendingSieve) {
    renderResolveOverlay(svg);
    return;
  }

  // Diff mode: show diff overlay
  if (state.mode === 'diff' && state.diffResult) {
    renderDiffOverlay(svg);
    return;
  }

  const elements = state.inventory?.elements;
  if (!elements) return;

  const dims = state.screenshotDims;
  svg.setAttribute('width', dims.w);
  svg.setAttribute('height', dims.h);
  svg.setAttribute('viewBox', '0 0 ' + dims.w + ' ' + dims.h);

  const inPass2 = state.mode === 'pass2' || state.mode === 'review';
  const pass2Set = inPass2 ? new Set(state.pass2Order) : null;

  let html = '';
  for (let i = 0; i < elements.length; i++) {
    const el = elements[i];
    const rect = el.rect;
    if (!rect) continue;

    const isCurrent = i === state.currentIndex;
    const classification = state.classifications[i];
    const glossary = state.glossaryNames[i];

    let stroke, strokeWidth, strokeDash, fill;

    if (inPass2) {
      // Pass 2 / Review overlay
      if (isCurrent) {
        stroke = '#22d3ee';
        strokeWidth = 3;
        strokeDash = '';
        fill = 'rgba(34,211,238,0.1)';
      } else if (glossary) {
        stroke = '#22c55e'; // green — named
        strokeWidth = 2;
        strokeDash = '';
        fill = 'none';
      } else if (pass2Set.has(i)) {
        stroke = '#eab308'; // yellow — unnamed, in pass2
        strokeWidth = 1;
        strokeDash = '4,3';
        fill = 'none';
      } else {
        stroke = '#333'; // faded — chrome/skip/excluded
        strokeWidth = 1;
        strokeDash = '4,3';
        fill = 'none';
      }
    } else {
      // Pass 1 overlay (original logic)
      if (isCurrent) {
        stroke = '#22d3ee';
        strokeWidth = 3;
        strokeDash = '';
        fill = 'rgba(34,211,238,0.1)';
      } else if (classification) {
        stroke = CATEGORY_COLORS[classification] || '#666';
        strokeWidth = classification === 'chrome' ? 1 : 2;
        strokeDash = '';
        fill = 'none';
        if (classification === 'skip') continue; // hide skipped
      } else {
        stroke = '#666';
        strokeWidth = 1;
        strokeDash = '4,3';
        fill = 'none';
      }
    }

    html += '<rect'
      + ' x="' + rect.x + '"'
      + ' y="' + rect.y + '"'
      + ' width="' + (rect.w || rect.width) + '"'
      + ' height="' + (rect.h || rect.height) + '"'
      + ' fill="' + fill + '"'
      + ' stroke="' + stroke + '"'
      + ' stroke-width="' + strokeWidth + '"'
      + (strokeDash ? ' stroke-dasharray="' + strokeDash + '"' : '')
      + ' data-index="' + i + '"'
      + ' onclick="jumpTo(' + i + ')"'
      + '/>';

    // Label: current element or named element in pass2
    if (isCurrent) {
      const labelText = el.label || el.tag || '?';
      const textY = rect.y - 4;
      html += '<text'
        + ' x="' + rect.x + '"'
        + ' y="' + (textY > 12 ? textY : rect.y + 14) + '"'
        + ' fill="#22d3ee"'
        + ' font-size="12"'
        + ' font-family="sans-serif"'
        + ' font-weight="600"'
        + '>' + escapeHtml(labelText) + '</text>';
    } else if (inPass2 && glossary) {
      const gLabel = (glossary.intent ? glossary.intent + '.' : '') + glossary.name;
      const textY = rect.y - 4;
      html += '<text'
        + ' x="' + rect.x + '"'
        + ' y="' + (textY > 12 ? textY : rect.y + 14) + '"'
        + ' fill="#4ade80"'
        + ' font-size="11"'
        + ' font-family="sans-serif"'
        + ' font-weight="500"'
        + '>' + escapeHtml(gLabel.slice(0, 25)) + '</text>';
    }
  }

  svg.innerHTML = html;
}

function updateModeIndicator() {
  var mi = document.getElementById('mode-indicator');
  if (!mi) return;
  var labels = { pass1: 'Pass 1: Classify', pass2: 'Pass 2: Name', review: 'Review', resolve: 'Resolve Matches', diff: 'Sieve Diff' };
  mi.textContent = labels[state.mode] || '';
  mi.className = state.mode;
}

var _lastPass2Rendered = -1;

function renderPass2Panel() {
  var elements = state.inventory?.elements;
  if (!elements) return;

  var el = elements[state.currentIndex];
  var detail = document.getElementById('element-detail');
  var controls = document.getElementById('panel-controls');
  var summary = document.getElementById('summary');
  summary.style.display = 'none';

  // Element info (left side) — always update
  if (el) {
    var locatorStr = '';
    if (el.locators) {
      locatorStr = Object.entries(el.locators)
        .filter(function (kv) { return kv[1]; })
        .map(function (kv) { return kv[0] + '=' + kv[1]; })
        .join(', ');
    }
    var glossary = state.glossaryNames[state.currentIndex];
    var nameDisplay = glossary
      ? '<div><span class="field-label">glossary name</span> '
        + '<span class="field-value" style="color:#4ade80">'
        + escapeHtml((glossary.intent ? glossary.intent + '.' : '') + glossary.name)
        + '</span></div>'
      : '';

    detail.innerHTML =
      '<div><span class="field-label">tag</span> '
        + '<span class="field-value">' + escapeHtml(el.tag || '—') + '</span></div>'
      + '<div><span class="field-label">label</span> '
        + '<span class="field-value label-text">"' + escapeHtml(el.label || '—') + '"</span></div>'
      + '<div><span class="field-label">region</span> '
        + '<span class="field-value">' + escapeHtml(el.region || '—') + '</span></div>'
      + (locatorStr
        ? '<div><span class="field-label">locators</span> '
          + '<span class="field-value">' + escapeHtml(locatorStr) + '</span></div>'
        : '')
      + '<div><span class="field-label">classification</span> '
        + '<span class="field-value" style="color:' + (CATEGORY_COLORS[state.classifications[state.currentIndex]] || '#fff')
        + '">' + (state.classifications[state.currentIndex] || '—') + '</span></div>'
      + nameDisplay;
  }

  // Controls (right side) — only rebuild when element changes to avoid clobbering input
  if (_lastPass2Rendered !== state.currentIndex) {
    _lastPass2Rendered = state.currentIndex;

    var existing = state.glossaryNames[state.currentIndex];
    var nameVal = existing ? existing.name : proposeName(el);
    var intentVal = existing ? existing.intent : deriveIntentName(el?.region);
    var notesVal = existing ? existing.notes : '';

    var namedCount = Object.keys(state.glossaryNames).length;
    var totalPass2 = state.pass2Order.length;

    controls.innerHTML =
      '<div class="pass2-controls">'
      + '<label>Intent</label>'
      + '<input id="intent-input" data-testid="intent-input" value="' + escapeHtml(intentVal) + '" placeholder="e.g. Login">'
      + '<label>Name</label>'
      + '<input id="name-input" data-testid="name-input" value="' + escapeHtml(nameVal) + '" placeholder="e.g. email">'
      + '<label>Notes</label>'
      + '<textarea id="notes-input" placeholder="optional">' + escapeHtml(notesVal) + '</textarea>'
      + '<div class="pass2-btn-row">'
      + '<button class="btn btn-primary" data-testid="btn-accept-name" onclick="acceptName()">Accept (Enter)</button>'
      + '<button class="btn" data-testid="btn-skip-name" onclick="skipName()">Skip (Tab)</button>'
      + '</div>'
      + '<div class="pass2-btn-row">'
      + '<button class="nav-btn" data-testid="nav-prev" onclick="navigate(-1)">&larr;</button>'
      + '<button class="nav-btn" data-testid="nav-next" onclick="navigate(1)">&rarr;</button>'
      + '<span data-testid="pass2-progress" style="font-size:12px;color:#888;">'
      + namedCount + ' of ' + totalPass2 + ' named</span>'
      + '</div>'
      + '</div>';

    // Auto-focus name input
    var nameInput = document.getElementById('name-input');
    if (nameInput) nameInput.focus();
  } else {
    // Just update progress count without rebuilding inputs
    var prog = controls.querySelector('[data-testid="pass2-progress"]');
    if (prog) {
      prog.textContent = Object.keys(state.glossaryNames).length + ' of ' + state.pass2Order.length + ' named';
    }
  }
}

function renderPanel() {
  updateModeIndicator();
  // Toggle Export Glossary button visibility
  var glossaryBtn = document.getElementById('btn-export-glossary');
  if (glossaryBtn) glossaryBtn.style.display = Object.keys(state.glossaryNames).length > 0 ? '' : 'none';

  // Toggle panel visibility between resolve/diff and normal modes
  var resolveDiv = document.getElementById('resolve-panel');
  var diffDiv = document.getElementById('diff-panel');
  var panelInfo = document.getElementById('panel-info');
  var panelControls = document.getElementById('panel-controls');

  if (state.mode === 'resolve') {
    renderResolvePanel();
    return;
  }

  if (state.mode === 'diff') {
    resolveDiv.style.display = 'none';
    diffDiv.style.display = 'flex';
    panelInfo.style.display = 'none';
    panelControls.style.display = 'none';
    renderDiffPanel();
    return;
  }

  // Restore normal panels (in case we're leaving resolve/diff mode)
  resolveDiv.style.display = 'none';
  diffDiv.style.display = 'none';
  panelInfo.style.display = '';
  panelControls.style.display = '';

  if (state.mode === 'pass2' || state.mode === 'review') {
    renderPass2Panel();
    return;
  }
  const elements = state.inventory?.elements;
  if (!elements || elements.length === 0) return;

  const el = elements[state.currentIndex];
  const detail = document.getElementById('element-detail');
  const summary = document.getElementById('summary');
  const classification = state.classifications[state.currentIndex];

  // Count classified
  const total = elements.length;
  const classifiedCount = Object.keys(state.classifications).length;

  // Element info
  if (el) {
    let locatorStr = '';
    if (el.locators) {
      locatorStr = Object.entries(el.locators)
        .filter(([, v]) => v)
        .map(([k, v]) => k + '=' + v)
        .join(', ');
    }

    detail.innerHTML =
      '<div><span class="field-label">tag</span> '
        + '<span class="field-value">' + escapeHtml(el.tag || '—') + '</span>'
        + (el['element-type'] || el.elementType
          ? ' <span class="field-value" style="color:#888">type=' + escapeHtml(el['element-type'] || el.elementType) + '</span>'
          : '')
        + '</div>'
      + '<div><span class="field-label">label</span> '
        + '<span class="field-value label-text">"' + escapeHtml(el.label || '—') + '"</span></div>'
      + '<div><span class="field-label">region</span> '
        + '<span class="field-value">' + escapeHtml(el.region || '—') + '</span></div>'
      + (locatorStr
        ? '<div><span class="field-label">locators</span> '
          + '<span class="field-value">' + escapeHtml(locatorStr) + '</span></div>'
        : '')
      + '<div><span class="field-label">sieve category</span> '
        + '<span class="field-value">' + escapeHtml(String(el.category || '—').replace(/^:/, '')) + '</span></div>'
      + (classification
        ? '<div><span class="field-label">your classification</span> '
          + '<span class="field-value" style="color:' + (CATEGORY_COLORS[classification] || '#fff')
          + '">' + classification + '</span></div>'
        : '');
  }

  // Progress
  document.getElementById('progress').textContent =
    '#' + (state.currentIndex + 1) + ' / ' + total;
  document.getElementById('classified-count').textContent =
    classifiedCount + ' classified';

  // If all classified, show summary
  if (classifiedCount >= total) {
    showSummary();
  } else {
    summary.style.display = 'none';
  }
}

function showSummary() {
  const elements = state.inventory?.elements;
  if (!elements) return;

  const counts = {};
  for (const cat of Object.values(state.classifications)) {
    counts[cat] = (counts[cat] || 0) + 1;
  }

  const summary = document.getElementById('summary');
  let html = '<div style="margin-bottom:6px;font-weight:600;color:#22d3ee;">'
    + 'Classification complete: ' + elements.length + ' elements</div>';

  for (const [cat, color] of Object.entries(CATEGORY_COLORS)) {
    if (cat === 'skip' && !counts[cat]) continue;
    if (counts[cat]) {
      html += '<div class="summary-row">'
        + '<span class="summary-dot" style="background:' + color + '"></span>'
        + '<span>' + counts[cat] + ' ' + cat + '</span>'
        + '</div>';
    }
  }

  if (state.mode === 'pass1') {
    html += '<button class="btn btn-primary" data-testid="btn-start-pass2" onclick="startPass2()" '
      + 'style="margin-top:8px;padding:6px 16px;">Start Pass 2 &rarr;</button>';
  }

  summary.innerHTML = html;
  summary.style.display = 'block';
}

function startPass2() {
  state.mode = 'pass2';
  buildPass2Order();
  if (state.pass2Order.length > 0) {
    state.pass2Cursor = 0;
    state.currentIndex = state.pass2Order[0];
  }
  saveState();
  renderOverlay();
  renderPanel();
  scrollToCurrentElement();
}

function acceptName() {
  if (state.mode !== 'pass2') return;
  var nameInput = document.getElementById('name-input');
  var intentInput = document.getElementById('intent-input');
  var notesInput = document.getElementById('notes-input');
  if (!nameInput) return;

  var name = nameInput.value.trim();
  if (!name) { showToast('Name cannot be empty'); return; }

  state.glossaryNames[state.currentIndex] = {
    name: name,
    intent: (intentInput?.value || '').trim(),
    source: 'human',
    notes: (notesInput?.value || '').trim(),
  };
  saveState();

  // Check if all pass2 elements are named
  var allNamed = true;
  for (var i = 0; i < state.pass2Order.length; i++) {
    if (!state.glossaryNames[state.pass2Order[i]]) { allNamed = false; break; }
  }
  if (allNamed) {
    state.mode = 'review';
    _lastPass2Rendered = -1;
    saveState();
    renderOverlay();
    renderPanel();
    return;
  }

  // Advance to next unnamed element
  var len = state.pass2Order.length;
  for (var j = 1; j <= len; j++) {
    var cursor = (state.pass2Cursor + j) % len;
    if (!state.glossaryNames[state.pass2Order[cursor]]) {
      state.pass2Cursor = cursor;
      state.currentIndex = state.pass2Order[cursor];
      break;
    }
  }
  _lastPass2Rendered = -1;
  saveState();
  renderOverlay();
  renderPanel();
  scrollToCurrentElement();
}

function skipName() {
  if (state.mode !== 'pass2') return;
  var len = state.pass2Order.length;
  if (len === 0) return;
  state.pass2Cursor = (state.pass2Cursor + 1) % len;
  state.currentIndex = state.pass2Order[state.pass2Cursor];
  _lastPass2Rendered = -1;
  saveState();
  renderOverlay();
  renderPanel();
  scrollToCurrentElement();
}

// ---- Classification ----
function classify(category) {
  if (!state.inventory?.elements?.length) return;
  if (state.mode === 'resolve' || state.mode === 'diff') return; // block during resolve/diff
  state.classifications[state.currentIndex] = category;
  saveState();

  // Advance to next unclassified, or next in line
  const total = state.inventory.elements.length;
  let next = state.currentIndex + 1;

  // Try to find next unclassified
  for (let i = 0; i < total; i++) {
    const idx = (state.currentIndex + 1 + i) % total;
    if (!(idx in state.classifications)) {
      next = idx;
      break;
    }
  }

  // If all classified, stay at current
  if (Object.keys(state.classifications).length >= total) {
    next = state.currentIndex;
  }

  state.currentIndex = Math.min(next, total - 1);
  renderOverlay();
  renderPanel();
  scrollToCurrentElement();
}

// ---- Pass 2 Helpers ----
function buildPass2Order() {
  var elements = state.inventory?.elements;
  if (!elements) { state.pass2Order = []; return; }

  // Collect non-chrome, non-skip indices
  var included = [];
  for (var i = 0; i < elements.length; i++) {
    var cat = state.classifications[i];
    if (cat === 'chrome' || cat === 'skip') continue;
    included.push(i);
  }

  // Group by region
  var groups = {};
  var order = [];
  for (var j = 0; j < included.length; j++) {
    var idx = included[j];
    var region = elements[idx].region || '__none__';
    if (!groups[region]) { groups[region] = []; order.push(region); }
    groups[region].push(idx);
  }

  // Within each region: interactables (clickable, typable) first, then others
  var interactable = { clickable: true, typable: true };
  var result = [];
  for (var k = 0; k < order.length; k++) {
    var g = groups[order[k]];
    var ia = [], rest = [];
    for (var m = 0; m < g.length; m++) {
      if (interactable[state.classifications[g[m]]]) ia.push(g[m]);
      else rest.push(g[m]);
    }
    result = result.concat(ia, rest);
  }

  state.pass2Order = result;
  state.pass2Cursor = 0;
}

function proposeName(el) {
  var raw = (el.locators?.testid)
    || (el.locators?.id)
    || (el.locators?.name)
    || (el.label)
    || (el.tag);
  if (!raw) return '';
  // kebab-case: lowercase, replace non-alphanumeric runs with hyphens, trim hyphens
  var name = raw.toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
  return name.slice(0, 30);
}

function deriveIntentName(region) {
  if (!region) return '';
  // Last segment of region path, title-cased
  var parts = region.split('>');
  var last = parts[parts.length - 1].trim();
  // Title-case: "login-form" -> "Login Form"
  return last.replace(/[-_]/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
}

// ---- Element Identity (qo2) ----

function isDynamicId(id) {
  if (!id || typeof id !== 'string') return false;
  // UUID pattern
  if (/[0-9a-f]{8}-[0-9a-f]{4}-/i.test(id)) return true;
  // Numeric only
  if (/^\d+$/.test(id)) return true;
  // Long hex string
  if (/^[0-9a-f]{9,}$/i.test(id)) return true;
  // Framework-generated patterns
  if (/^(ember|react|__next|:r\d|ng-|mat-|cdk-|mui-)/i.test(id)) return true;
  // Ends with long number suffix
  if (/-\d{4,}$/.test(id)) return true;
  return false;
}

function elementKey(el) {
  if (el.locators?.testid) return 'testid::' + el.locators.testid;
  if (el.locators?.id && !isDynamicId(el.locators.id)) return 'id::' + el.locators.id;
  if (el.locators?.name) return 'name::' + el.locators.name;
  return 'composite::' + (el.region || '') + '::' + (el.tag || '') + '::' + (el.label || '');
}

function matchElements(oldEls, newEls) {
  var oldByKey = {};
  var newByKey = {};

  for (var i = 0; i < oldEls.length; i++) {
    var k = elementKey(oldEls[i]);
    if (!oldByKey[k]) oldByKey[k] = [];
    oldByKey[k].push(i);
  }
  for (var j = 0; j < newEls.length; j++) {
    var k2 = elementKey(newEls[j]);
    if (!newByKey[k2]) newByKey[k2] = [];
    newByKey[k2].push(j);
  }

  var matched = [];
  var added = [];
  var removed = [];
  var ambiguous = [];

  // Collect all keys from both sets
  var allKeys = {};
  for (var ok in oldByKey) allKeys[ok] = true;
  for (var nk in newByKey) allKeys[nk] = true;

  for (var key in allKeys) {
    var oldIdxs = oldByKey[key] || [];
    var newIdxs = newByKey[key] || [];

    if (oldIdxs.length === 1 && newIdxs.length === 1) {
      matched.push({ oldIdx: oldIdxs[0], newIdx: newIdxs[0], key: key });
    } else if (oldIdxs.length === 0) {
      for (var a = 0; a < newIdxs.length; a++) {
        added.push({ newIdx: newIdxs[a], key: key });
      }
    } else if (newIdxs.length === 0) {
      for (var r = 0; r < oldIdxs.length; r++) {
        removed.push({ oldIdx: oldIdxs[r], key: key });
      }
    } else {
      // Ambiguous: multiple on at least one side
      ambiguous.push({ key: key, oldIdxs: oldIdxs, newIdxs: newIdxs });
    }
  }

  return { matched: matched, added: added, removed: removed, ambiguous: ambiguous };
}

function propagateNames(matchResult, oldClassifications, oldGlossaryNames, resolvedPairs) {
  var cls = {};
  var names = {};

  // Auto-matched pairs
  for (var i = 0; i < matchResult.matched.length; i++) {
    var m = matchResult.matched[i];
    if (oldClassifications[m.oldIdx] !== undefined) {
      cls[m.newIdx] = oldClassifications[m.oldIdx];
    }
    if (oldGlossaryNames[m.oldIdx]) {
      names[m.newIdx] = oldGlossaryNames[m.oldIdx];
    }
  }

  // User-resolved pairs from ambiguity resolution
  if (resolvedPairs) {
    for (var j = 0; j < resolvedPairs.length; j++) {
      var p = resolvedPairs[j];
      if (oldClassifications[p.oldIdx] !== undefined) {
        cls[p.newIdx] = oldClassifications[p.oldIdx];
      }
      if (oldGlossaryNames[p.oldIdx]) {
        names[p.newIdx] = oldGlossaryNames[p.oldIdx];
      }
    }
  }

  return { classifications: cls, glossaryNames: names };
}

// ---- Diff Computation (cuo) ----

function computeDiff(oldEls, newEls, matchResult) {
  var added = [];
  var removed = [];
  var changed = [];
  var unchanged = [];

  // Process matched pairs — detect changes
  for (var i = 0; i < matchResult.matched.length; i++) {
    var m = matchResult.matched[i];
    var oldEl = oldEls[m.oldIdx];
    var newEl = newEls[m.newIdx];
    var changes = [];

    // Compare label
    if ((oldEl.label || '') !== (newEl.label || '')) {
      changes.push('label: \'' + (oldEl.label || '') + '\' \u2192 \'' + (newEl.label || '') + '\'');
    }
    // Compare tag
    if ((oldEl.tag || '') !== (newEl.tag || '')) {
      changes.push('tag: ' + (oldEl.tag || '') + ' \u2192 ' + (newEl.tag || ''));
    }
    // Compare region
    if ((oldEl.region || '') !== (newEl.region || '')) {
      changes.push('region: ' + (oldEl.region || '') + ' \u2192 ' + (newEl.region || ''));
    }
    // Compare bounding box (5px tolerance)
    var oldBox = oldEl.rect || oldEl.box;
    var newBox = newEl.rect || newEl.box;
    if (oldBox && newBox) {
      var dx = Math.abs((oldBox.x || 0) - (newBox.x || 0));
      var dy = Math.abs((oldBox.y || 0) - (newBox.y || 0));
      var dw = Math.abs((oldBox.width || oldBox.w || 0) - (newBox.width || newBox.w || 0));
      var dh = Math.abs((oldBox.height || oldBox.h || 0) - (newBox.height || newBox.h || 0));
      if (dx > 5 || dy > 5 || dw > 5 || dh > 5) {
        changes.push('moved/resized');
      }
    }
    // Compare visible text
    if ((oldEl.visibleText || '') !== (newEl.visibleText || '')) {
      changes.push('text changed');
    }

    if (changes.length > 0) {
      changed.push({ oldIdx: m.oldIdx, newIdx: m.newIdx, key: m.key, oldEl: oldEl, newEl: newEl, changes: changes });
    } else {
      unchanged.push({ oldIdx: m.oldIdx, newIdx: m.newIdx, key: m.key });
    }
  }

  // Added elements (only in new)
  for (var a = 0; a < matchResult.added.length; a++) {
    var add = matchResult.added[a];
    added.push({ newIdx: add.newIdx, key: add.key, el: newEls[add.newIdx] });
  }

  // Removed elements (only in old)
  for (var r = 0; r < matchResult.removed.length; r++) {
    var rem = matchResult.removed[r];
    removed.push({ oldIdx: rem.oldIdx, key: rem.key, el: oldEls[rem.oldIdx] });
  }

  return { added: added, removed: removed, changed: changed, unchanged: unchanged };
}

function classifyDiff(diff, urlA, urlB) {
  var addedCount = diff.added.length;
  var removedCount = diff.removed.length;
  var changedCount = diff.changed.length;

  if (addedCount === 0 && removedCount === 0 && changedCount === 0) return 'no-effect';

  var urlChanged = (urlA || '') !== (urlB || '');
  var totalOld = removedCount + changedCount + diff.unchanged.length;
  var totalNew = addedCount + changedCount + diff.unchanged.length;
  var maxTotal = Math.max(totalOld, totalNew, 1);

  if (urlChanged && (removedCount + addedCount) / maxTotal > 0.5) return 'navigation';
  if (addedCount > 0 && removedCount === 0 && changedCount === 0) return 'reveal';
  if (removedCount > 0 && addedCount === 0 && changedCount === 0) return 'conceal';
  if (changedCount > 0 && addedCount === 0 && removedCount === 0) return 'state-mutation';
  return 'compound';
}

// ---- Resolve Mode (qo2) ----

function enterResolveMode(matchResult, pendingSieve) {
  state._preResolveMode = state.mode;
  state.mode = 'resolve';
  state._pendingSieve = pendingSieve;

  var groups = matchResult.ambiguous;
  state.resolveContext = {
    allGroups: groups,
    currentGroupIdx: 0,
    selectedOld: null,
    selectedNew: null,
    pairs: [],
    removedOld: [],
    addedNew: [],
    matchResult: matchResult,
  };

  renderOverlay();
  renderPanel();
}

function resolveSelectOld(idx) {
  if (!state.resolveContext) return;
  // Don't select if already paired or marked
  if (state.resolveContext.pairs.some(function (p) { return p.oldIdx === idx; })) return;
  if (state.resolveContext.removedOld.indexOf(idx) >= 0) return;
  state.resolveContext.selectedOld = idx;
  renderResolvePanel();
  renderOverlay();
}

function resolveSelectNew(idx) {
  if (!state.resolveContext) return;
  if (state.resolveContext.pairs.some(function (p) { return p.newIdx === idx; })) return;
  if (state.resolveContext.addedNew.indexOf(idx) >= 0) return;

  // If an old element is selected, pair them
  if (state.resolveContext.selectedOld !== null) {
    state.resolveContext.pairs.push({
      oldIdx: state.resolveContext.selectedOld,
      newIdx: idx,
    });
    state.resolveContext.selectedOld = null;
    state.resolveContext.selectedNew = null;

    // Check if current group is done, auto-advance
    if (isCurrentGroupResolved()) {
      if (state.resolveContext.currentGroupIdx < state.resolveContext.allGroups.length - 1) {
        state.resolveContext.currentGroupIdx++;
      }
    }
    renderResolvePanel();
    renderOverlay();
  } else {
    state.resolveContext.selectedNew = idx;
    renderResolvePanel();
    renderOverlay();
  }
}

function resolveMarkOldRemoved(idx) {
  if (!state.resolveContext) return;
  state.resolveContext.removedOld.push(idx);
  if (state.resolveContext.selectedOld === idx) state.resolveContext.selectedOld = null;
  if (isCurrentGroupResolved() && state.resolveContext.currentGroupIdx < state.resolveContext.allGroups.length - 1) {
    state.resolveContext.currentGroupIdx++;
  }
  renderResolvePanel();
  renderOverlay();
}

function resolveMarkNewAdded(idx) {
  if (!state.resolveContext) return;
  state.resolveContext.addedNew.push(idx);
  if (state.resolveContext.selectedNew === idx) state.resolveContext.selectedNew = null;
  if (isCurrentGroupResolved() && state.resolveContext.currentGroupIdx < state.resolveContext.allGroups.length - 1) {
    state.resolveContext.currentGroupIdx++;
  }
  renderResolvePanel();
  renderOverlay();
}

function resolveUndoPair(oldIdx, newIdx) {
  if (!state.resolveContext) return;
  state.resolveContext.pairs = state.resolveContext.pairs.filter(function (p) {
    return !(p.oldIdx === oldIdx && p.newIdx === newIdx);
  });
  renderResolvePanel();
  renderOverlay();
}

function resolveUndoRemoved(idx) {
  if (!state.resolveContext) return;
  state.resolveContext.removedOld = state.resolveContext.removedOld.filter(function (i) { return i !== idx; });
  renderResolvePanel();
  renderOverlay();
}

function resolveUndoAdded(idx) {
  if (!state.resolveContext) return;
  state.resolveContext.addedNew = state.resolveContext.addedNew.filter(function (i) { return i !== idx; });
  renderResolvePanel();
  renderOverlay();
}

function isCurrentGroupResolved() {
  var ctx = state.resolveContext;
  if (!ctx) return false;
  var group = ctx.allGroups[ctx.currentGroupIdx];
  if (!group) return false;

  // Every old element in this group must be paired or marked removed
  for (var i = 0; i < group.oldIdxs.length; i++) {
    var oi = group.oldIdxs[i];
    var paired = ctx.pairs.some(function (p) { return p.oldIdx === oi; });
    var removed = ctx.removedOld.indexOf(oi) >= 0;
    if (!paired && !removed) return false;
  }
  // Every new element in this group must be paired or marked added
  for (var j = 0; j < group.newIdxs.length; j++) {
    var ni = group.newIdxs[j];
    var paired2 = ctx.pairs.some(function (p) { return p.newIdx === ni; });
    var added = ctx.addedNew.indexOf(ni) >= 0;
    if (!paired2 && !added) return false;
  }
  return true;
}

function areAllGroupsResolved() {
  var ctx = state.resolveContext;
  if (!ctx) return false;
  for (var g = 0; g < ctx.allGroups.length; g++) {
    var group = ctx.allGroups[g];
    for (var i = 0; i < group.oldIdxs.length; i++) {
      var oi = group.oldIdxs[i];
      if (!ctx.pairs.some(function (p) { return p.oldIdx === oi; }) && ctx.removedOld.indexOf(oi) < 0) return false;
    }
    for (var j = 0; j < group.newIdxs.length; j++) {
      var ni = group.newIdxs[j];
      if (!ctx.pairs.some(function (p) { return p.newIdx === ni; }) && ctx.addedNew.indexOf(ni) < 0) return false;
    }
  }
  return true;
}

function finishResolve() {
  var ctx = state.resolveContext;
  var pending = state._pendingSieve;
  if (!ctx || !pending) return;

  // Chain into diff mode — let user review changes before committing
  enterDiffMode(ctx.matchResult, pending, ctx.pairs);
}

// ---- Diff Mode (cuo) ----

function enterDiffMode(matchResult, pendingSieve, resolvedPairs) {
  var oldEls = pendingSieve.oldInventory.elements;
  var newEls = pendingSieve.inventory.elements;

  state.diffResult = computeDiff(oldEls, newEls, matchResult);
  state.diffClass = classifyDiff(
    state.diffResult,
    pendingSieve.oldInventory.url?.raw || pendingSieve.oldInventory.url || state.pageUrl,
    pendingSieve.inventory.url?.raw || pendingSieve.inventory.url
  );
  state.diffSelectedIdx = null;
  state._diffResolvedPairs = resolvedPairs || null;

  // Save pre-diff mode (may already be saved from resolve)
  if (state.mode !== 'resolve') {
    state._preDiffMode = state.mode;
  } else {
    state._preDiffMode = state._preResolveMode || 'pass1';
  }

  state._pendingSieve = pendingSieve;
  state.mode = 'diff';

  // Show new screenshot in diff mode
  if (state.screenshotUrl) URL.revokeObjectURL(state.screenshotUrl);
  state.screenshotUrl = pendingSieve.screenshotUrl;
  state.screenshotDataUrl = pendingSieve.screenshotDataUrl;

  // Clean up resolve state
  state.resolveContext = null;
  state._preResolveMode = null;

  updateModeIndicator();
  renderOverlay();
  renderPanel();
  renderMetadata();
  saveState();
  renderScreenshot().catch(function () {});
}

function acceptDiff() {
  var pending = state._pendingSieve;
  var diff = state.diffResult;
  if (!pending || !diff) return;

  // Propagate names from old → new
  var propagated = propagateNames(
    pending.matchResult,
    pending.oldClassifications,
    pending.oldGlossaryNames,
    state._diffResolvedPairs
  );

  // Apply new inventory
  state.inventory = pending.inventory;
  state.pageUrl = pending.inventory.url?.raw || pending.inventory.url || null;
  state.classifications = propagated.classifications;
  state.glossaryNames = propagated.glossaryNames;
  state.currentIndex = 0;

  // Restore mode
  state.mode = state._preDiffMode || 'pass1';

  // Clear diff state
  state.diffResult = null;
  state.diffClass = null;
  state.diffSelectedIdx = null;
  state._diffResolvedPairs = null;
  state._pendingSieve = null;
  state._preDiffMode = null;

  // Rebuild pass2 order if returning to pass2
  if (state.mode === 'pass2') {
    buildPass2Order();
    state.pass2Cursor = 0;
    if (state.pass2Order.length > 0) state.currentIndex = state.pass2Order[0];
  }

  var summary = diff.added.length + ' added, ' + diff.removed.length + ' removed, '
    + diff.changed.length + ' changed, ' + diff.unchanged.length + ' unchanged';
  showToast('Diff accepted: ' + summary);

  updateModeIndicator();
  renderOverlay();
  renderPanel();
  renderMetadata();
  saveState();
}

function renderDiffPanel() {
  var diff = state.diffResult;
  var pending = state._pendingSieve;
  if (!diff || !pending) return;

  var panel = document.getElementById('diff-panel');
  var classification = state.diffClass || 'unknown';
  var oldUrl = pending.oldInventory?.url?.raw || pending.oldInventory?.url || state.pageUrl || '';
  var newUrl = pending.inventory?.url?.raw || pending.inventory?.url || '';

  // Classification banner
  var bannerText = classification;
  if (classification === 'navigation' && oldUrl !== newUrl) {
    bannerText += ' \u2014 URL changed from ' + oldUrl + ' to ' + newUrl;
  }

  var html = '<div class="diff-banner" data-testid="diff-classification">' + escapeHtml(bannerText) + '</div>';

  // Counts
  html += '<div class="diff-counts">'
    + '<span class="added" data-testid="diff-added-count">' + diff.added.length + ' added</span>'
    + '<span class="removed" data-testid="diff-removed-count">' + diff.removed.length + ' removed</span>'
    + '<span class="changed" data-testid="diff-changed-count">' + diff.changed.length + ' changed</span>'
    + '<span class="unchanged">' + diff.unchanged.length + ' unchanged</span>'
    + '</div>';

  // Scrollable change list
  html += '<div class="diff-list" data-testid="diff-change-list">';

  var flatIdx = 0;

  // Added items
  for (var a = 0; a < diff.added.length; a++) {
    var ae = diff.added[a];
    var sel = state.diffSelectedIdx === flatIdx ? ' selected' : '';
    html += '<div class="diff-item diff-added' + sel + '" onclick="diffSelectItem(' + flatIdx + ')">'
      + '<span class="di-type added">new</span>'
      + '<span class="di-tag">' + escapeHtml(ae.el?.tag || '?') + '</span> '
      + '<span class="di-label">' + escapeHtml((ae.el?.label || '').slice(0, 40)) + '</span>'
      + '</div>';
    flatIdx++;
  }

  // Removed items
  for (var r = 0; r < diff.removed.length; r++) {
    var re = diff.removed[r];
    var sel2 = state.diffSelectedIdx === flatIdx ? ' selected' : '';
    html += '<div class="diff-item diff-removed' + sel2 + '" onclick="diffSelectItem(' + flatIdx + ')">'
      + '<span class="di-type removed">removed</span>'
      + '<span class="di-tag">' + escapeHtml(re.el?.tag || '?') + '</span> '
      + '<span class="di-label">' + escapeHtml((re.el?.label || '').slice(0, 40)) + '</span>'
      + '</div>';
    flatIdx++;
  }

  // Changed items
  for (var c = 0; c < diff.changed.length; c++) {
    var ce = diff.changed[c];
    var sel3 = state.diffSelectedIdx === flatIdx ? ' selected' : '';
    html += '<div class="diff-item diff-changed' + sel3 + '" onclick="diffSelectItem(' + flatIdx + ')">'
      + '<span class="di-type changed">changed</span>'
      + '<span class="di-tag">' + escapeHtml(ce.newEl?.tag || '?') + '</span> '
      + '<span class="di-label">' + escapeHtml((ce.newEl?.label || '').slice(0, 40)) + '</span>'
      + '<div class="di-changes">' + escapeHtml(ce.changes.join(', ')) + '</div>'
      + '</div>';
    flatIdx++;
  }

  html += '</div>';

  // Accept button
  html += '<div class="diff-actions">'
    + '<button class="btn" data-testid="btn-accept-diff" onclick="acceptDiff()"'
    + ' style="background:#1e3a5f;color:#60a5fa;border:1px solid #60a5fa;">'
    + 'Accept \u2014 apply changes</button>'
    + '</div>';

  panel.innerHTML = html;
}

function diffSelectItem(flatIdx) {
  state.diffSelectedIdx = (state.diffSelectedIdx === flatIdx) ? null : flatIdx;
  renderDiffPanel();
  renderOverlay();
}

function renderResolvePanel() {
  var ctx = state.resolveContext;
  if (!ctx) return;

  var group = ctx.allGroups[ctx.currentGroupIdx];
  if (!group) return;

  var pending = state._pendingSieve;
  var oldEls = pending.oldInventory.elements;
  var newEls = pending.inventory.elements;

  var resolveDiv = document.getElementById('resolve-panel');
  var panelInfo = document.getElementById('panel-info');
  var panelControls = document.getElementById('panel-controls');

  // Show resolve panel, hide normal panels
  panelInfo.style.display = 'none';
  panelControls.style.display = 'none';
  resolveDiv.style.display = 'flex';

  var html = '';

  // Banner
  html += '<div class="resolve-banner" data-testid="resolve-banner">'
    + '<span>Resolve ambiguous matches: group ' + (ctx.currentGroupIdx + 1) + ' of ' + ctx.allGroups.length
    + ' &mdash; key: <code style="background:#1a1a2e;padding:2px 6px;border-radius:3px;">' + escapeHtml(group.key) + '</code></span>'
    + '<span data-testid="resolve-progress">' + (areAllGroupsResolved() ? 'All resolved' : 'Resolving...') + '</span>'
    + '</div>';

  // Two columns
  html += '<div class="resolve-columns">';

  // Old elements column
  html += '<div class="resolve-col" data-testid="resolve-old-list"><h4>Old elements (carry data from)</h4>';
  for (var i = 0; i < group.oldIdxs.length; i++) {
    var oi = group.oldIdxs[i];
    var oel = oldEls[oi];
    var isPaired = ctx.pairs.some(function (p) { return p.oldIdx === oi; });
    var isRemoved = ctx.removedOld.indexOf(oi) >= 0;
    var isSelected = ctx.selectedOld === oi;

    var itemClass = 'resolve-item';
    if (isPaired) itemClass += ' paired';
    else if (isRemoved) itemClass += ' marked';
    else if (isSelected) itemClass += ' selected';

    var catColor = CATEGORY_COLORS[pending.oldClassifications[oi]] || '#666';
    var gName = pending.oldGlossaryNames[oi];

    html += '<div class="' + itemClass + '">';
    if (isPaired) {
      var pairedNew = ctx.pairs.find(function (p) { return p.oldIdx === oi; }).newIdx;
      html += '<span class="ri-tag">' + escapeHtml(oel.tag || '?') + '</span>'
        + '<span class="ri-label">' + escapeHtml(oel.label || '—') + '</span>'
        + '<span style="color:#22c55e;font-size:11px;">paired→#' + pairedNew + '</span>'
        + '<button class="btn" style="font-size:10px;padding:2px 6px;" onclick="resolveUndoPair(' + oi + ',' + pairedNew + ')">undo</button>';
    } else if (isRemoved) {
      html += '<span class="ri-tag">' + escapeHtml(oel.tag || '?') + '</span>'
        + '<span class="ri-label">' + escapeHtml(oel.label || '—') + '</span>'
        + '<span style="color:#ef4444;font-size:11px;">removed</span>'
        + '<button class="btn" style="font-size:10px;padding:2px 6px;" onclick="resolveUndoRemoved(' + oi + ')">undo</button>';
    } else {
      html += '<span class="ri-tag">' + escapeHtml(oel.tag || '?') + '</span>'
        + '<span class="ri-label">' + escapeHtml(oel.label || '—') + '</span>';
      if (pending.oldClassifications[oi]) {
        html += '<span class="ri-cat" style="border-color:' + catColor + ';color:' + catColor + ';">'
          + pending.oldClassifications[oi] + '</span>';
      }
      if (gName) {
        html += '<span class="ri-name">' + escapeHtml((gName.intent ? gName.intent + '.' : '') + gName.name) + '</span>';
      }
      html += '<button class="btn" style="font-size:10px;padding:2px 6px;" onclick="resolveSelectOld(' + oi + ')">select</button>'
        + '<button class="btn" style="font-size:10px;padding:2px 6px;color:#ef4444;border-color:#ef4444;" onclick="resolveMarkOldRemoved(' + oi + ')">removed</button>';
    }
    html += '</div>';
  }
  html += '</div>';

  // New elements column
  html += '<div class="resolve-col" data-testid="resolve-new-list"><h4>New elements (receive data)</h4>';
  for (var j = 0; j < group.newIdxs.length; j++) {
    var ni = group.newIdxs[j];
    var nel = newEls[ni];
    var isPaired2 = ctx.pairs.some(function (p) { return p.newIdx === ni; });
    var isAdded = ctx.addedNew.indexOf(ni) >= 0;
    var isSelected2 = ctx.selectedNew === ni;

    var itemClass2 = 'resolve-item';
    if (isPaired2) itemClass2 += ' paired';
    else if (isAdded) itemClass2 += ' marked';
    else if (isSelected2) itemClass2 += ' selected';

    html += '<div class="' + itemClass2 + '">';
    if (isPaired2) {
      var pairedOld = ctx.pairs.find(function (p) { return p.newIdx === ni; }).oldIdx;
      html += '<span class="ri-tag">' + escapeHtml(nel.tag || '?') + '</span>'
        + '<span class="ri-label">' + escapeHtml(nel.label || '—') + '</span>'
        + '<span style="color:#22c55e;font-size:11px;">←paired#' + pairedOld + '</span>'
        + '<button class="btn" style="font-size:10px;padding:2px 6px;" onclick="resolveUndoPair(' + pairedOld + ',' + ni + ')">undo</button>';
    } else if (isAdded) {
      html += '<span class="ri-tag">' + escapeHtml(nel.tag || '?') + '</span>'
        + '<span class="ri-label">' + escapeHtml(nel.label || '—') + '</span>'
        + '<span style="color:#3b82f6;font-size:11px;">new</span>'
        + '<button class="btn" style="font-size:10px;padding:2px 6px;" onclick="resolveUndoAdded(' + ni + ')">undo</button>';
    } else {
      html += '<span class="ri-tag">' + escapeHtml(nel.tag || '?') + '</span>'
        + '<span class="ri-label">' + escapeHtml(nel.label || '—') + '</span>';
      var rect = nel.rect;
      if (rect) {
        html += '<span style="color:#666;font-size:10px;">' + Math.round(rect.x) + ',' + Math.round(rect.y) + '</span>';
      }
      html += '<button class="btn" style="font-size:10px;padding:2px 6px;" onclick="resolveSelectNew(' + ni + ')">select</button>'
        + '<button class="btn" style="font-size:10px;padding:2px 6px;color:#3b82f6;border-color:#3b82f6;" onclick="resolveMarkNewAdded(' + ni + ')">new</button>';
    }
    html += '</div>';
  }
  html += '</div></div>'; // close columns

  // Action bar
  var allDone = areAllGroupsResolved();
  html += '<div class="resolve-actions">';
  if (ctx.allGroups.length > 1) {
    html += '<button class="btn" onclick="resolveNavGroup(-1)"'
      + (ctx.currentGroupIdx === 0 ? ' disabled style="opacity:0.4"' : '') + '>&larr; Prev group</button>';
    html += '<button class="btn" onclick="resolveNavGroup(1)"'
      + (ctx.currentGroupIdx >= ctx.allGroups.length - 1 ? ' disabled style="opacity:0.4"' : '') + '>Next group &rarr;</button>';
  }
  html += '<span style="flex:1;"></span>';
  html += '<button class="btn btn-primary" data-testid="btn-resolve-done" onclick="finishResolve()"'
    + (allDone ? '' : ' disabled style="opacity:0.4"') + '>Done — apply matches</button>';
  html += '</div>';

  resolveDiv.innerHTML = html;
}

function resolveNavGroup(delta) {
  if (!state.resolveContext) return;
  var next = state.resolveContext.currentGroupIdx + delta;
  if (next >= 0 && next < state.resolveContext.allGroups.length) {
    state.resolveContext.currentGroupIdx = next;
    state.resolveContext.selectedOld = null;
    state.resolveContext.selectedNew = null;
    renderResolvePanel();
    renderOverlay();
  }
}

function navigate(delta) {
  if (!state.inventory?.elements?.length) return;
  if (state.mode === 'resolve' || state.mode === 'diff') return; // block navigation during resolve/diff
  if (state.mode === 'pass2') {
    var len = state.pass2Order.length;
    if (len === 0) return;
    state.pass2Cursor = Math.max(0, Math.min(len - 1, state.pass2Cursor + delta));
    state.currentIndex = state.pass2Order[state.pass2Cursor];
    _lastPass2Rendered = -1;
  } else {
    const total = state.inventory.elements.length;
    state.currentIndex = Math.max(0, Math.min(total - 1, state.currentIndex + delta));
  }
  saveState();
  renderOverlay();
  renderPanel();
  scrollToCurrentElement();
}

function jumpTo(index) {
  if (!state.inventory?.elements?.length) return;
  state.currentIndex = index;
  if (state.mode === 'pass2') {
    var pos = state.pass2Order.indexOf(index);
    if (pos >= 0) state.pass2Cursor = pos;
    _lastPass2Rendered = -1;
  }
  saveState();
  renderOverlay();
  renderPanel();
}

function scrollToCurrentElement() {
  const el = state.inventory?.elements?.[state.currentIndex];
  if (!el?.rect) return;

  const viewport = document.getElementById('viewport');
  const rect = el.rect;

  // Scroll to center the element in the viewport
  const targetY = rect.y - viewport.clientHeight / 3;
  const targetX = rect.x - viewport.clientWidth / 3;
  viewport.scrollTo({
    top: Math.max(0, targetY),
    left: Math.max(0, targetX),
    behavior: 'smooth',
  });
}

// ---- Intermediate Format ----
function toIntermediate(st) {
  const inv = st.inventory;
  if (!inv?.elements) return null;

  const elements = inv.elements.map(function (el, i) {
    const cat = String(el.category || '').replace(/^:/, '');
    const classification = st.classifications[i] || null;
    const rect = el.rect || {};
    return {
      'sieve-id': 'el-' + String(i + 1).padStart(3, '0'),
      'category': classification || cat,
      'category-source': classification ? 'human' : 'sieve',
      'tag': el.tag || null,
      'element-type': el['element-type'] || el.elementType || null,
      'label': el.label || null,
      'locators': el.locators || {},
      'state': { 'visible': true, 'disabled': false },
      'rect': { 'x': rect.x, 'y': rect.y, 'w': rect.w || rect.width, 'h': rect.h || rect.height },
      'region': el.region || null,
      'form': el.form || null,
      'aria-role': el['aria-role'] || el.ariaRole || null,
      'glossary-name': st.glossaryNames[i]?.name || null,
      'glossary-intent': st.glossaryNames[i]?.intent || null,
      'glossary-source': st.glossaryNames[i]?.source || null,
      'notes': st.glossaryNames[i]?.notes || null,
    };
  });

  const vp = inv.viewport || st.screenshotDims;
  return {
    'sieve-version': '1.0',
    'source': {
      'url': st.pageUrl,
      'viewport': { 'w': vp.w, 'h': vp.h },
      'timestamp': new Date().toISOString(),
      'screenshot': st.screenshotDataUrl || null,
    },
    'elements': elements,
    'metadata': {
      'cookies': inv.cookies || [],
      'storage': {
        'localStorage': inv.storage?.localStorage || [],
        'sessionStorage': inv.storage?.sessionStorage || [],
      },
      'tabs': inv.tabs || 1,
    },
    'pass-1-complete': Object.keys(st.classifications).length >= (inv.elements?.length || 0),
    'pass-2-progress': Object.keys(st.glossaryNames).length,
  };
}

// ---- Glossary EDN Export (07k) ----

function bestLocator(locators) {
  if (!locators) return null;
  if (locators.testid) return { strategy: 'testid', value: locators.testid };
  if (locators.id && !isDynamicId(locators.id)) return { strategy: 'id', value: locators.id };
  if (locators.name) return { strategy: 'name', value: locators.name };
  if (locators.href) return { strategy: 'css', value: '[href="' + locators.href + '"]' };
  return null;
}

function toGlossaryIntents(data) {
  if (!data || !data.elements) return [];
  var groups = {};
  data.elements.forEach(function (el) {
    var name = el['glossary-name'];
    var intent = el['glossary-intent'];
    if (!name || !intent) return;
    if (!groups[intent]) groups[intent] = { intent: intent, description: '', elements: {} };
    var loc = bestLocator(el.locators);
    groups[intent].elements[name] = {
      desc: el.label || '',
      type: (el.category || '').replace(/^:/, ''),
      binding: loc,
    };
  });
  return Object.values(groups);
}

function toEdn(intentObj) {
  var lines = [];
  lines.push(';; Intent region: ' + intentObj.intent);
  lines.push('');
  lines.push('{:intent "' + intentObj.intent + '"');
  lines.push(' :description "' + (intentObj.description || '') + '"');
  lines.push(' :elements');

  var keys = Object.keys(intentObj.elements);
  if (keys.length === 0) {
    lines.push(' {}}');
    return lines.join('\n');
  }

  // Compute padding for alignment
  var maxKeyLen = Math.max.apply(null, keys.map(function (k) { return k.length; }));

  keys.forEach(function (key, idx) {
    var el = intentObj.elements[key];
    var pad = new Array(maxKeyLen - key.length + 1).join(' ');
    var prefix = idx === 0 ? ' {:' : '  :';
    var suffix = idx === keys.length - 1 ? '}}' : '';

    var bindingStr = 'nil';
    if (el.binding) {
      bindingStr = '{:web {:' + el.binding.strategy + ' "' + el.binding.value + '"}}';
    }

    lines.push(prefix + key + pad + ' {:desc "' + (el.desc || '') + '"');
    lines.push(new Array(prefix.length + key.length + pad.length + 2).join(' ')
      + ':type :' + (el.type || 'readable'));
    lines.push(new Array(prefix.length + key.length + pad.length + 2).join(' ')
      + ':bindings ' + bindingStr + '}' + suffix);
  });

  return lines.join('\n');
}

function fromIntermediate(data) {
  const errors = validateIntermediate(data);
  if (errors.length) return errors;

  // Rebuild inventory in the shape the UI expects
  const inventory = {
    url: { raw: data.source.url },
    viewport: data.source.viewport,
    cookies: data.metadata.cookies,
    storage: data.metadata.storage,
    tabs: data.metadata.tabs,
    elements: data.elements.map(function (el) {
      return {
        tag: el.tag,
        'element-type': el['element-type'],
        label: el.label,
        category: ':' + el.category,
        locators: el.locators,
        rect: el.rect,
        region: el.region,
        form: el.form,
        'aria-role': el['aria-role'],
      };
    }),
  };

  // Rebuild classifications from elements with human-sourced categories
  const classifications = {};
  data.elements.forEach(function (el, i) {
    if (el['category-source'] === 'human') {
      classifications[i] = el.category;
    }
  });

  // Rebuild glossary names from elements
  var glossaryNames = {};
  data.elements.forEach(function (el, i) {
    if (el['glossary-name'] && el['glossary-source'] === 'human') {
      glossaryNames[i] = {
        name: el['glossary-name'],
        intent: el['glossary-intent'] || '',
        source: el['glossary-source'],
        notes: el['notes'] || '',
      };
    }
  });

  // Determine mode from data
  var pass1Done = data['pass-1-complete'];
  var hasNames = Object.keys(glossaryNames).length > 0;

  // Hydrate state
  state.inventory = inventory;
  state.classifications = classifications;
  state.glossaryNames = glossaryNames;
  state.mode = hasNames ? 'pass2' : (pass1Done ? 'pass1' : 'pass1');
  state.pageUrl = data.source.url;
  state.currentIndex = 0;
  state.screenshotDataUrl = data.source.screenshot || null;

  // Restore screenshot
  if (state.screenshotUrl) URL.revokeObjectURL(state.screenshotUrl);
  if (data.source.screenshot) {
    // Convert data URL back to blob URL for the <img>
    const parts = data.source.screenshot.match(/^data:([^;]+);base64,(.+)$/);
    if (parts) {
      const byteStr = atob(parts[2]);
      const bytes = new Uint8Array(byteStr.length);
      for (let i = 0; i < byteStr.length; i++) bytes[i] = byteStr.charCodeAt(i);
      const blob = new Blob([bytes], { type: parts[1] });
      state.screenshotUrl = URL.createObjectURL(blob);
    }
  } else {
    state.screenshotUrl = null;
  }

  // Rebuild pass2Order if resuming pass2
  if (state.mode === 'pass2') {
    buildPass2Order();
    var pos = state.pass2Order.indexOf(state.currentIndex);
    state.pass2Cursor = pos >= 0 ? pos : 0;
  }

  return [];
}

function validateIntermediate(data) {
  const errors = [];
  if (!data || typeof data !== 'object') { return ['Data must be an object']; }
  if (data['sieve-version'] !== '1.0') errors.push('Missing or unsupported sieve-version (expected "1.0")');
  if (!data.source || typeof data.source !== 'object') {
    errors.push('Missing source object');
